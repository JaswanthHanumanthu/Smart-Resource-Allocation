name: Keep Streamlit App Awake
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger so you can test it immediately

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App URL
        run: |
          # Replace 'YOUR_APP_URL' with the actual URL of your deployed Streamlit app
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://YOUR_APP_URL.streamlit.app/
